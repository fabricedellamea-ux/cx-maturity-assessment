    // ─── Shared Utility ──────────────────────────────────────────────
    function computeScores(answers) {
      const sectionScores = SECTIONS.map((section) => {
        const maxScore = section.questions.length * 4;
        let earned = 0;
        const questionScores = [];
        section.questions.forEach((q, qi) => {
          const globalIdx = SECTIONS.slice(0, SECTIONS.indexOf(section)).reduce((a, s) => a + s.questions.length, 0) + qi;
          const ansIdx = answers[globalIdx];
          const qScore = (ansIdx !== null && ansIdx !== undefined) ? q.options[ansIdx].score : 0;
          earned += qScore;
          questionScores.push({ question: q.text, score: qScore, maxScore: 4, answerLabel: (ansIdx !== null && ansIdx !== undefined) ? q.options[ansIdx].label : 'Not answered' });
        });
        const pct = Math.round((earned / maxScore) * 100);
        return { id: section.id, title: section.title, icon: section.icon, earned, maxScore, pct, questionScores };
      });
      const totalEarned = sectionScores.reduce((a, s) => a + s.earned, 0);
      const totalMax = sectionScores.reduce((a, s) => a + s.maxScore, 0);
      const totalScore = Math.round((totalEarned / totalMax) * 100);
      const level = MATURITY_LEVELS.find(l => totalScore >= l.min && totalScore <= l.max) || MATURITY_LEVELS[0];
      const sorted = [...sectionScores].sort((a, b) => a.pct - b.pct);
      return { sectionScores, totalScore, level, sorted };
    }

    // ─── S-Curve Maturity Map ────────────────────────────────────────
    function SCurveMap({ score, compact = false }) {
      const w = compact ? 400 : 520;
      const h = compact ? 160 : 200;
      const pad = { l: 45, r: 25, t: 20, b: 35 };
      const gw = w - pad.l - pad.r;
      const gh = h - pad.t - pad.b;

      // S-curve points
      const curvePoints = [];
      for (let i = 0; i <= 100; i++) {
        const t = i / 100;
        const x = pad.l + t * gw;
        const y = pad.t + gh - (1 / (1 + Math.exp(-10 * (t - 0.5)))) * gh;
        curvePoints.push(`${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${y.toFixed(1)}`);
      }
      const pathD = curvePoints.join(' ');

      // User position
      const t = Math.max(0, Math.min(100, score)) / 100;
      const ux = pad.l + t * gw;
      const uy = pad.t + gh - (1 / (1 + Math.exp(-10 * (t - 0.5)))) * gh;

      const levels = [
        { name: 'Reactive', pos: 0.1, color: '#ef4444' },
        { name: 'Emerging', pos: 0.3, color: '#f97316' },
        { name: 'Scaling', pos: 0.5, color: '#eab308' },
        { name: 'Optimizing', pos: 0.7, color: '#9333ea' },
        { name: 'Visionary', pos: 0.9, color: '#10b981' },
      ];

      return (
        <svg viewBox={`0 0 ${w} ${h}`} className="w-full" style={{ maxWidth: compact ? 400 : 520 }}>
          {/* Grid lines */}
          {levels.map((lv) => {
            const lx = pad.l + lv.pos * gw;
            return <line key={lv.name} x1={lx} y1={pad.t} x2={lx} y2={pad.t + gh} stroke="#e5e7eb" strokeWidth="1" strokeDasharray="4,4" />;
          })}
          {/* Curve */}
          <path d={pathD} fill="none" stroke="url(#sCurveGrad)" strokeWidth="3.5" strokeLinecap="round" />
          <defs>
            <linearGradient id="sCurveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stopColor="#ef4444" />
              <stop offset="25%" stopColor="#f97316" />
              <stop offset="50%" stopColor="#eab308" />
              <stop offset="75%" stopColor="#9333ea" />
              <stop offset="100%" stopColor="#10b981" />
            </linearGradient>
          </defs>
          {/* Level labels */}
          {levels.map((lv) => {
            const lx = pad.l + lv.pos * gw;
            return (
              <text key={lv.name + '-label'} x={lx} y={h - 6} textAnchor="middle" fontSize={compact ? 9 : 10} fontWeight="600" fill={lv.color}>{lv.name}</text>
            );
          })}
          {/* Y axis label */}
          <text x={12} y={h / 2} textAnchor="middle" fontSize="9" fill="#9ca3af" transform={`rotate(-90,12,${h/2})`}>CX Capability</text>
          {/* User dot */}
          <circle cx={ux} cy={uy} r="10" fill="#9333ea" fillOpacity="0.15" className="dot-pulse" />
          <circle cx={ux} cy={uy} r="6" fill="#7e22ce" stroke="white" strokeWidth="2.5" />
          {/* Score label */}
          <rect x={ux - 22} y={uy - 28} width="44" height="20" rx="6" fill="#7e22ce" />
          <text x={ux} y={uy - 15} textAnchor="middle" fontSize="11" fontWeight="700" fill="white">{score}%</text>
          <polygon points={`${ux-4},${uy-9} ${ux+4},${uy-9} ${ux},${uy-4}`} fill="#7e22ce" />
        </svg>
      );
    }

    // ─── Gauge ───────────────────────────────────────────────────────
    function Gauge({ score, size = 200 }) {
      const radius = size * 0.4;
      const circumference = 2 * Math.PI * radius;
      const offset = circumference - (score / 100) * circumference;
      const level = MATURITY_LEVELS.find(l => score >= l.min && score <= l.max) || MATURITY_LEVELS[0];
      return (
        <div className="flex flex-col items-center">
          <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="drop-shadow-lg">
            <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="#e5e7eb" strokeWidth="14" />
            <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="url(#gaugeGrad)" strokeWidth="14" strokeLinecap="round" strokeDasharray={circumference} strokeDashoffset={offset} className="gauge-fill" transform={`rotate(-90 ${size/2} ${size/2})`} />
            <defs><linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stopColor="#9333ea" /><stop offset="100%" stopColor="#c084fc" /></linearGradient></defs>
            <text x={size/2} y={size*0.46} textAnchor="middle" fill="#1f2937" fontSize={size*0.2} fontWeight="800">{score}</text>
            <text x={size/2} y={size*0.575} textAnchor="middle" fill="#6b7280" fontSize={size*0.065} fontWeight="500">out of 100</text>

            <span className={`text-base font-bold ${level.text}`}>{level.name}</span>
          </div>
        </div>
      );
    }

    function LeadGateForm({ answers, onSubmit, onBack }) {
      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      const [company, setCompany] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const [error, setError] = useState('');
      const { totalScore, level } = useMemo(() => computeScores(answers), [answers]);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!name.trim() || !email.trim()) { setError('Please fill in your name and email.'); return; }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setError('Please enter a valid email address.'); return; }
        setSubmitting(true);
        setError('');
        try {
          await fetch(WEBHOOK_URL, {
            method: 'POST', mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name, email, company, totalScore, maturityLevel: level.name,
              infrastructure: computeScores(answers).sectionScores[0].pct,
              automation: computeScores(answers).sectionScores[1].pct,
              coaching: computeScores(answers).sectionScores[2].pct,
              wfm: computeScores(answers).sectionScores[3].pct,
              aiInsights: computeScores(answers).sectionScores[4].pct,
              timestamp: new Date().toISOString(),
            }),
          });
        } catch (err) { /* non-blocking */ }
        onSubmit({ name, email, company });
      };

      return (
        <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-brand-950 via-brand-900 to-brand-800 px-4">
          <div className="max-w-md w-full slide-up">

    //  APP
    // ═══════════════════════════════════════════════════════════════════
    function App() {
      const [screen, setScreen] = useState('landing');
      const totalQuestions = SECTIONS.reduce((a, s) => a + s.questions.length, 0);
      const [answers, setAnswers] = useState(Array(totalQuestions).fill(null));
      const [currentQ, setCurrentQ] = useState(0);
      const [leadData, setLeadData] = useState({ name: '', email: '', company: '' });

      const { section, question, sectionIndex, localQIndex } = useMemo(() => {
        let count = 0;
        for (let si = 0; si < SECTIONS.length; si++) {
          for (let qi = 0; qi < SECTIONS[si].questions.length; qi++) {
            if (count === currentQ) return { section: SECTIONS[si], question: SECTIONS[si].questions[qi], sectionIndex: si, localQIndex: qi };
            count++;
          }
        }
        return { section: SECTIONS[0], question: SECTIONS[0].questions[0], sectionIndex: 0, localQIndex: 0 };
      }, [currentQ]);

      const handleSelect = useCallback((optIdx) => {
        setAnswers(prev => { const n = [...prev]; n[currentQ] = optIdx; return n; });
      }, [currentQ]);

      const handleNext = useCallback(() => {
        if (currentQ === totalQuestions - 1) setScreen('teaser');
        else setCurrentQ(q => q + 1);
      }, [currentQ, totalQuestions]);

      const handleBack = useCallback(() => {
        if (currentQ > 0) setCurrentQ(q => q - 1);
      }, [currentQ]);

      const handleRestart = useCallback(() => {
        setAnswers(Array(totalQuestions).fill(null));
        setCurrentQ(0);
        setLeadData({ name: '', email: '', company: '' });
        setScreen('landing');
      }, [totalQuestions]);

      if (screen === 'landing') return <LandingPage onStart={() => setScreen('assessment')} />;
      if (screen === 'teaser') return <TeaserSummary answers={answers} onUnlock={() => setScreen('leadgate')} />;
      if (screen === 'leadgate') return <LeadGateForm answers={answers} onSubmit={(data) => { setLeadData(data); setScreen('report'); }} onBack={() => setScreen('teaser')} />;
      if (screen === 'report') return <FullReport answers={answers} leadData={leadData} onRestart={handleRestart} />;

      return (
        <QuestionPage
          section={section} question={question} questionIndex={currentQ} totalQuestions={totalQuestions}
          currentSectionIndex={sectionIndex} localQIndex={localQIndex} selectedAnswer={answers[currentQ]}
          onSelect={handleSelect} onNext={handleNext} onBack={handleBack}
        />
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
